<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonto</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="brand">
        <img src="../icons/icon48.png" class="brand-icon" alt="" />
        <span class="brand-name">Sonto</span>
      </div>
      <div class="header-actions">
        <button id="btn-clipboard" class="icon-btn" type="button" aria-label="Clipboard history">
          <svg aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="2" width="8" height="4" rx="1"/>
            <path d="M6 4H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1"/>
            <path d="M8 11h4M8 14h2"/>
          </svg>
        </button>
        <button id="btn-theme" class="icon-btn" type="button" aria-label="Toggle theme">
          <svg id="icon-moon" aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M17 12.5A7 7 0 0 1 7.5 3a7 7 0 1 0 9.5 9.5z"/>
          </svg>
          <svg id="icon-sun" class="hidden" aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="10" cy="10" r="3.5"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.9 4.9l1.4 1.4M13.7 13.7l1.4 1.4M4.9 15.1l1.4-1.4M13.7 6.3l1.4-1.4"/>
          </svg>
        </button>
        <button id="btn-settings" class="icon-btn" type="button" aria-label="Settings">
          <svg aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M8.3 3h3.4l.4 2.1a5.5 5.5 0 0 1 1.5.9l2-.7 1.7 2.9-1.6 1.4a5.6 5.6 0 0 1 0 1.8l1.6 1.4-1.7 2.9-2-.7a5.5 5.5 0 0 1-1.5.9L11.7 17H8.3l-.4-2.1a5.5 5.5 0 0 1-1.5-.9l-2 .7L2.7 11.8l1.6-1.4a5.6 5.6 0 0 1 0-1.8L2.7 7.2l1.7-2.9 2 .7a5.5 5.5 0 0 1 1.5-.9L8.3 3z"/>
            <circle cx="10" cy="10" r="2.2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ZEN VIEW -->
    <div id="view-zen" class="view zen-view">
      <div id="zen-feed" class="zen-feed"></div>
    </div>

    <!-- CLIPBOARD VIEW -->
    <div id="view-clipboard" class="view hidden">
      <div class="clip-toolbar">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all" type="button">
            All <span class="filter-count">0</span>
          </button>
          <button class="filter-tab" data-filter="text" type="button">
            Text <span class="filter-count">0</span>
          </button>
          <button class="filter-tab" data-filter="link" type="button">
            Links <span class="filter-count">0</span>
          </button>
          <button class="filter-tab" data-filter="code" type="button">
            Code <span class="filter-count">0</span>
          </button>
          <button class="filter-tab" data-filter="pinned" type="button">
            Pinned <span class="filter-count">0</span>
          </button>
        </div>
        <div class="clip-actions">
          <span id="clip-count" class="clip-total-count hidden">0</span>
          <div class="export-dropdown" id="export-dropdown">
            <button id="btn-export" class="link-btn" type="button">Export ▾</button>
            <div class="export-menu hidden" id="export-menu">
              <button id="btn-export-md" type="button">Markdown</button>
              <button id="btn-export-json" type="button">JSON</button>
            </div>
          </div>
          <button id="btn-clear-all" class="link-btn danger" type="button">Clear</button>
        </div>
      </div>

      <div class="browse-search-bar">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="9" cy="9" r="5" />
          <path d="M12.5 12.5L16 16" stroke-linecap="round" />
        </svg>
        <input type="search" id="clipboard-search" class="browse-search-input" placeholder="Search clipboard history..." />
      </div>

      <div id="read-later-bar" class="read-later-bar hidden">
        <span id="read-later-count"></span>
        <button id="btn-view-later" class="rl-btn" type="button">View queue</button>
      </div>
      <div id="read-later-list" class="read-later-list hidden"></div>

      <div id="clip-list" class="clip-list"></div>
    </div>
  </div>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
