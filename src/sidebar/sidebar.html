<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonto</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="brand">
        <img src="../icons/icon48.png" class="brand-icon" alt="" />
        <span class="brand-name">Sonto</span>
      </div>
      <div class="header-actions">
        <div class="mode-toggle">
          <button id="btn-zen" class="mode-btn active" type="button" title="Zen mode">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="3" y="3" width="6" height="6" rx="1.5"/>
              <rect x="11" y="3" width="6" height="6" rx="1.5"/>
              <rect x="3" y="11" width="6" height="6" rx="1.5"/>
              <rect x="11" y="11" width="6" height="6" rx="1.5"/>
            </svg>
          </button>
          <button id="btn-browse" class="mode-btn" type="button" title="Browse saved snippets">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="10" cy="10" r="7"/>
              <path d="M10 6v4l2.5 2.5" stroke-linecap="round"/>
            </svg>
          </button>
          <button id="btn-chat" class="mode-btn" type="button" title="Chat with your snippets">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M4 5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H8l-3 2.5V13H6a2 2 0 0 1-2-2V5z"/>
              <path d="M7 7h6M7 10h4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <button id="btn-settings" class="icon-btn" type="button" title="Settings">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M8.3 3h3.4l.4 2.1a5.5 5.5 0 0 1 1.5.9l2-.7 1.7 2.9-1.6 1.4a5.6 5.6 0 0 1 0 1.8l1.6 1.4-1.7 2.9-2-.7a5.5 5.5 0 0 1-1.5.9L11.7 17H8.3l-.4-2.1a5.5 5.5 0 0 1-1.5-.9l-2 .7L2.7 11.8l1.6-1.4a5.6 5.6 0 0 1 0-1.8L2.7 7.2l1.7-2.9 2 .7a5.5 5.5 0 0 1 1.5-.9L8.3 3z"/>
            <circle cx="10" cy="10" r="2.2"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="view-zen" class="view zen-view">
      <div id="zen-feed" class="zen-feed"></div>
    </div>

    <div id="view-browse" class="view hidden">
      <div class="snippet-count-bar">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all" type="button">All <span id="count-all" class="filter-count">0</span></button>
          <button class="filter-tab" data-filter="manual" type="button">Saved <span id="count-manual" class="filter-count">0</span></button>
          <button class="filter-tab" data-filter="history" type="button">History <span id="count-history" class="filter-count">0</span></button>
        </div>
        <button id="btn-clear-all" class="link-btn danger" type="button">Clear all</button>
      </div>
      <div id="snippet-list" class="snippet-list">
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
              <path d="M12 8h24a3 3 0 0 1 3 3v26a3 3 0 0 1-3 3H12a3 3 0 0 1-3-3V11a3 3 0 0 1 3-3z"/>
              <path d="M17 16h14M17 22h10M17 28h6"/>
              <circle cx="34" cy="34" r="8" fill="#0d0d0d" stroke-width="1.4"/>
              <path d="M31 34h6M34 31v6" stroke-width="1.4"/>
            </svg>
          </div>
          <div class="empty-title">No saved snippets</div>
          <div class="empty-desc">Highlight text on any page and press <strong>Alt+Shift+C</strong> or right-click to save it here.</div>
        </div>
      </div>
    </div>

    <div id="view-chat" class="view hidden">
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-area">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Ask anything about your saved snippets..."
          rows="2"
        ></textarea>
        <button id="btn-send" class="send-btn" type="button">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 10h10M11 6l4 4-4 4"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
