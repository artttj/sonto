<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonto</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="brand">
        <img src="../icons/icon48.png" class="brand-icon" alt="" />
        <span class="brand-name">Sonto</span>
      </div>
      <div class="header-actions">
        <button id="btn-feed" class="icon-btn" type="button" aria-label="Feed" title="Feed">
          <i data-lucide="waves"></i>
        </button>
        <button id="btn-back" class="btn-ghost hidden" type="button" aria-label="Back">
          <svg aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 10H5M8 7l-3 3 3 3"/>
          </svg>
          <span>Back</span>
        </button>
        <button id="btn-theme" class="icon-btn ghost" type="button" aria-label="Toggle theme">
          <svg id="icon-moon" aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M17 12.5A7 7 0 0 1 7.5 3a7 7 0 1 0 9.5 9.5z"/>
          </svg>
          <svg id="icon-sun" class="hidden" aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="10" cy="10" r="3.5"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.9 4.9l1.4 1.4M13.7 13.7l1.4 1.4M4.9 15.1l1.4-1.4M13.7 6.3l1.4-1.4"/>
          </svg>
        </button>
        <button id="btn-settings" class="icon-btn" type="button" aria-label="Settings">
          <svg aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M8.3 3h3.4l.4 2.1a5.5 5.5 0 0 1 1.5.9l2-.7 1.7 2.9-1.6 1.4a5.6 5.6 0 0 1 0 1.8l1.6 1.4-1.7 2.9-2-.7a5.5 5.5 0 0 1-1.5.9L11.7 17H8.3l-.4-2.1a5.5 5.5 0 0 1-1.5-.9l-2 .7L2.7 11.8l1.6-1.4a5.6 5.6 0 0 1 0-1.8L2.7 7.2l1.7-2.9 2 .7a5.5 5.5 0 0 1 1.5-.9L8.3 3z"/>
            <circle cx="10" cy="10" r="2.2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ZEN VIEW -->
    <div id="view-zen" class="view zen-view">
      <div id="zen-feed" class="zen-feed"></div>
      <div id="cosmos-view" class="cosmos-view hidden"></div>
    </div>

    <!-- CLIPBOARD VIEW -->
    <div id="view-clipboard" class="view hidden">
      <div class="view-tabs">
        <button id="nav-browse" class="view-tab active" type="button">
          <span class="tab-label">Browse</span>
          <button id="pin-browse" class="tab-pin" type="button" title="Pin as default" aria-label="Pin Browse as default tab"></button>
        </button>
        <button id="nav-prompts" class="view-tab" type="button">
          <span class="tab-label">Prompts</span>
          <button id="pin-prompts" class="tab-pin" type="button" title="Pin as default" aria-label="Pin Prompts as default tab"></button>
        </button>
      </div>

      <div id="browse-content">
        <div class="browse-search-bar">
          <svg class="search-icon" aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="9" cy="9" r="5" />
            <path d="M12.5 12.5L16 16" stroke-linecap="round" />
          </svg>
          <label for="clipboard-search" class="visually-hidden">Search clipboard history</label>
          <input type="search" id="clipboard-search" class="browse-search-input" placeholder="Search clipboard history..." aria-label="Search clipboard history" />
        </div>

        <div id="read-later-bar" class="read-later-bar hidden">
          <span id="read-later-count"></span>
          <button id="btn-view-later" class="rl-btn" type="button">View queue</button>
        </div>
        <div id="read-later-list" class="read-later-list hidden"></div>

        <div id="clip-list" class="clip-list"></div>
      </div>

      <div id="prompts-content" class="hidden">
        <div class="prompts-filters" id="prompts-filters"></div>
        <div class="browse-search-bar">
          <svg class="search-icon" aria-hidden="true" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="9" cy="9" r="5" />
            <path d="M12.5 12.5L16 16" stroke-linecap="round" />
          </svg>
          <label for="prompts-search" class="visually-hidden">Search prompts</label>
          <input type="search" id="prompts-search" class="browse-search-input" placeholder="Search prompts..." aria-label="Search prompts" />
          <button id="btn-add-prompt" class="icon-btn-small" type="button" title="Add prompt" aria-label="Add new prompt">
            <i data-lucide="plus"></i>
          </button>
        </div>

        <div id="prompt-modal" class="prompt-modal hidden">
          <div class="prompt-modal-content">
            <h3 class="prompt-modal-title">New Prompt</h3>
            <textarea id="prompt-input" class="prompt-textarea" placeholder="Enter your prompt text..." rows="6"></textarea>
            <input type="text" id="prompt-label-input" class="prompt-label-input" placeholder="Label (optional)" maxlength="30" />
            <div class="prompt-color-picker">
              <button type="button" class="color-dot color-dot-red" data-color="red" title="Red"></button>
              <button type="button" class="color-dot color-dot-orange" data-color="orange" title="Orange"></button>
              <button type="button" class="color-dot color-dot-yellow" data-color="yellow" title="Yellow"></button>
              <button type="button" class="color-dot color-dot-green" data-color="green" title="Green"></button>
              <button type="button" class="color-dot color-dot-blue" data-color="blue" title="Blue"></button>
              <button type="button" class="color-dot color-dot-purple" data-color="purple" title="Purple"></button>
              <button type="button" class="color-dot color-dot-gray" data-color="gray" title="Gray"></button>
            </div>
            <div class="prompt-modal-actions">
              <button id="prompt-cancel" class="prompt-btn prompt-btn-secondary" type="button">Cancel</button>
              <button id="prompt-save" class="prompt-btn prompt-btn-primary" type="button">Save</button>
            </div>
          </div>
        </div>

        <div id="prompts-list" class="clip-list"></div>
      </div>
    </div>

  </div>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
